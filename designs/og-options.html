<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PCG — OG Option 6</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Gilda+Display&family=Jost:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Jost', sans-serif;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(148deg,
        #FFF5F0 0%, #FFD6CC 12%, #F4B8C1 26%, #E8A0B4 40%,
        #D4A0C8 55%, #B8A8D8 70%, #98A8E0 84%, #8ABCE8 100%);
      z-index: 0;
    }

    .top-bar {
      position: relative; z-index: 2; height: 4px;
      background: linear-gradient(90deg, #FFD6CC, #F4B8C1, #E8A0B4, #D4A0C8, #B8A8D8, #98A8E0, #8ABCE8);
    }

    .page {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 40px 80px;
    }

    .page-title {
      font-family: 'Gilda Display', Georgia, serif;
      font-size: 2rem;
      color: rgba(30, 18, 48, 0.88);
      margin-bottom: 8px;
    }

    .page-sub {
      font-size: 0.88rem;
      font-weight: 300;
      color: rgba(60, 40, 80, 0.6);
      margin-bottom: 56px;
    }

    .option {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .og-frame {
      width: 600px;
      height: 315px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(80, 40, 100, 0.2);
      position: relative;
      flex-shrink: 0;
    }

    .option-meta {
      display: flex;
      align-items: baseline;
      gap: 14px;
    }

    .option-num {
      font-family: 'Gilda Display', Georgia, serif;
      font-size: 1.3rem;
      color: rgba(80, 40, 100, 0.82);
      flex-shrink: 0;
    }

    .option-label {
      font-size: 0.82rem;
      font-weight: 400;
      color: rgba(30, 18, 48, 0.55);
    }

    /* ─── OG-7 BASE ─── */

    .og-7 {
      background: rgba(42, 18, 60, 1);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .og-7 .strip {
      height: 5px;
      background: linear-gradient(90deg, #FFD6CC, #F4B8C1, #E8A0B4, #D4A0C8, #B8A8D8, #98A8E0, #8ABCE8);
      flex-shrink: 0;
    }

    .og-7 .body {
      flex: 1;
      display: grid;
      grid-template-columns: 2fr 3fr;
      position: relative;
    }

    .og-7 .body-left {
      padding: 96px 20px 32px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 14px;
    }

    .og-7 .logo-block {
      display: inline-flex;
      flex-direction: column;
      gap: 5px;
    }

    .og-7 .logo-line {
      display: block;
      width: 100%;
      height: 10px;
    }

    .og-7 .body-left .logo {
      font-family: 'Gilda Display', Georgia, serif;
      font-size: 21px;
      line-height: 20px;
      height: 20px;
      color: rgba(255, 210, 220, 0.95);
      letter-spacing: -0.01em;
      white-space: nowrap;
      text-shadow: 0 0 12px rgba(255,255,255,0.9), 0 0 4px rgba(255,255,255,0.8), 0 1px 3px rgba(0,0,0,0.4);
    }

    .og-7 .body-left h2 {
      font-family: 'Gilda Display', Georgia, serif;
      font-size: 24px;
      font-weight: 400;
      line-height: 1.2;
      color: rgba(255, 245, 248, 0.95);
    }

    .og-7 .body-left h2 em { color: #F4B8C1; display: block; margin-top: 3px; }

    .og-7 .body-right {
      background: linear-gradient(180deg, rgba(212,160,200,0.15) 0%, rgba(138,188,232,0.12) 100%);
      border-left: 1px solid rgba(255,255,255,0.12);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 32px 20px;
      gap: 14px;
      position: relative;
    }

    /* spacer reserves space for PCG in flex flow; PCG is absolutely positioned in body-right */
    .og-7 .logo-spacer {
      height: 35px;
      flex-shrink: 0;
      width: 100%;
    }

    .og-7 .services-header {
      position: absolute;
      top: 55px;
      left: 50%;
      transform: translate(-50%, -50%);
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .og-7 .services-header .pcg-label {
      font-family: 'Gilda Display', Georgia, serif;
      font-size: 36px;
      color: rgba(244, 184, 193, 0.95);
      font-style: italic;
      line-height: 1;
      white-space: nowrap;
      text-shadow: 0 0 12px rgba(255,255,255,0.9), 0 0 4px rgba(255,255,255,0.8), 0 1px 3px rgba(0,0,0,0.4);
    }

    .og-7 .services-line {
      display: block;
      width: 100%;
      height: 10px;
    }

    .og-7 .service-icons {
      position: absolute;
      bottom: 37px;
      left: 20px;
      right: 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .og-7 .sicon-emoji {
      font-size: 24px;
      line-height: 1;
    }

    .og-7 .divider-icon {
      position: absolute;
      left: 120px;
      top: 53px;
      transform: translate(-50%, -50%);
      z-index: 10;
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: white;
      box-shadow: 0 2px 14px rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .og-7 .body-right .pills {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 7px;
      width: 100%;
      margin-top: -49px;
    }

    .og-7 .body-right .pill {
      font-size: 14px;
      font-weight: 500;
      padding: 8px 5px;
      border-radius: 100px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255, 255, 255, 1);
      white-space: nowrap;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="page">
    <h1 class="page-title">OG Image — Option 6</h1>
    <p class="page-sub">Center medallion gold line. White pill text.</p>

    <div class="option">
      <div class="og-frame og-7">
        <div class="strip"></div>
        <div class="body">
          <div class="divider-icon">
            <svg width="32" height="32" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
              <defs><linearGradient id="hg6" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#F4B8C1"/><stop offset="100%" stop-color="#B8A8D8"/></linearGradient></defs>
              <path d="M64 96 C64 96 22 70 22 44 C22 30 33 20 48 25 C55 27 60 33 64 38 C68 33 73 27 80 25 C95 20 106 30 106 44 C106 70 64 96 64 96Z" fill="url(#hg6)"/>
            </svg>
          </div>
          <div class="body-left">
            <div class="logo-block">
              <div class="logo">Parental Care Guide</div>
              <svg class="logo-line" viewBox="0 0 200 12" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                  <linearGradient id="gl6a" x1="0" y1="0" x2="88" y2="0" gradientUnits="userSpaceOnUse">
                    <stop offset="0%" stop-color="#C9A84C" stop-opacity="0"/>
                    <stop offset="100%" stop-color="#C9A84C"/>
                  </linearGradient>
                  <linearGradient id="gl6b" x1="112" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
                    <stop offset="0%" stop-color="#C9A84C"/>
                    <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
                  </linearGradient>
                </defs>
                <rect x="0" y="5.5" width="88" height="1" fill="url(#gl6a)"/>
                <rect x="112" y="5.5" width="88" height="1" fill="url(#gl6b)"/>
                <polygon points="100,1 108,6 100,11 92,6" fill="#F7E4A0"/>
                <circle cx="100" cy="6" r="2" fill="rgba(42,18,60,1)"/>
              </svg>
            </div>
            <h2>Care for your parents.<br><em>Not the paperwork.</em></h2>
          </div>
          <div class="body-right">
            <div class="services-header">
              <div class="pcg-label">Services</div>
              <svg class="services-line" viewBox="0 0 200 12" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                  <linearGradient id="glSa" x1="0" y1="0" x2="88" y2="0" gradientUnits="userSpaceOnUse">
                    <stop offset="0%" stop-color="#C9A84C" stop-opacity="0"/>
                    <stop offset="100%" stop-color="#C9A84C"/>
                  </linearGradient>
                  <linearGradient id="glSb" x1="112" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
                    <stop offset="0%" stop-color="#C9A84C"/>
                    <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
                  </linearGradient>
                </defs>
                <rect x="0" y="5.5" width="88" height="1" fill="url(#glSa)"/>
                <rect x="112" y="5.5" width="88" height="1" fill="url(#glSb)"/>
                <polygon points="100,1 108,6 100,11 92,6" fill="#F7E4A0"/>
                <circle cx="100" cy="6" r="2" fill="rgba(42,18,60,1)"/>
              </svg>
            </div>
            <div class="logo-spacer"></div>
            <div class="pills">
              <span class="pill">Care coordination</span><span class="pill">Insurance</span>
              <span class="pill">Medications</span><span class="pill">Legal docs</span>
              <span class="pill">Family sharing</span><span class="pill">Financial planning</span>
            </div>
            <div class="service-icons">
              <span class="sicon-emoji">🏥</span>
              <span class="sicon-emoji">📋</span>
              <span class="sicon-emoji">💊</span>
              <span class="sicon-emoji">📄</span>
              <span class="sicon-emoji">👨‍👩‍👧</span>
              <span class="sicon-emoji">💰</span>
            </div>
          </div>
        </div>
      </div>
      <div class="option-meta"><span class="option-num">6</span><span class="option-label">Center medallion — lines flanking a hollow diamond</span></div>
    </div>

  </div>
</body>
</html>
