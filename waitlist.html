<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Waitlist — Parental Care Guide</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Gilda+Display&family=Jost:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --deep-plum: #501464;
      --text-dark: #1e1230;
      --text-mid:  #4a2d65;
      --text-light:#6b4d85;
      --glass-bg:  rgba(255,255,255,0.38);
      --glass-border: rgba(255,255,255,0.55);
    }

    body {
      font-family: 'Jost', sans-serif;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background: linear-gradient(148deg,
        #FFF5F0 0%, #FFD6CC 12%, #F4B8C1 26%,
        #E8A0B4 40%, #D4A0C8 55%,
        #B8A8D8 70%, #98A8E0 84%, #8ABCE8 100%);
      z-index: 0;
    }

    .top-bar {
      position: relative; z-index: 2; height: 4px;
      background: linear-gradient(90deg, #FFD6CC, #F4B8C1, #E8A0B4, #D4A0C8, #B8A8D8, #98A8E0, #8ABCE8);
    }

    header {
      position: relative; z-index: 2;
      padding: 24px 60px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .logo {
      font-family: 'Gilda Display', Georgia, serif;
      font-size: 1.1rem; color: var(--text-dark);
    }
    .logo span { color: var(--deep-plum); }

    .page {
      position: relative; z-index: 2;
      max-width: 900px; margin: 0 auto;
      padding: 40px 60px 80px;
    }

    .page-title {
      font-family: 'Gilda Display', Georgia, serif;
      font-size: 2rem; color: var(--text-dark);
      margin-bottom: 6px;
    }

    .page-sub {
      font-size: 0.875rem; font-weight: 300;
      color: var(--text-light); margin-bottom: 32px;
    }

    .stats-row {
      display: flex; gap: 20px; margin-bottom: 32px; flex-wrap: wrap;
    }

    .stat-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 16px; padding: 20px 28px;
      backdrop-filter: blur(16px);
      box-shadow: 0 4px 16px rgba(160,100,180,0.07);
    }

    .stat-card strong {
      display: block;
      font-family: 'Gilda Display', Georgia, serif;
      font-size: 2rem; font-weight: 400;
      color: var(--text-dark); margin-bottom: 4px;
    }

    .stat-card span {
      font-size: 0.875rem; font-weight: 300;
      color: var(--text-light);
    }

    .table-wrap {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 18px;
      backdrop-filter: blur(16px);
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(160,100,180,0.07);
    }

    .toolbar {
      padding: 16px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.4);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }

    .search-input {
      padding: 9px 16px;
      font-family: 'Jost', sans-serif;
      font-size: 0.875rem;
      background: rgba(255,255,255,0.52);
      border: 1.5px solid rgba(255,255,255,0.7);
      border-radius: 100px; outline: none;
      color: var(--text-dark); width: 240px;
    }
    .search-input::placeholder { color: rgba(80,50,100,0.4); }

    .export-btn {
      padding: 9px 20px;
      font-family: 'Jost', sans-serif;
      font-size: 0.875rem; font-weight: 600;
      background: var(--deep-plum); color: #fff;
      border: none; border-radius: 100px; cursor: pointer;
    }
    .export-btn:hover { background: #3c1950; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead th {
      padding: 12px 24px;
      text-align: left;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-light);
      border-bottom: 1px solid rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.15);
    }

    tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.3);
      transition: background 0.15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.18); }

    tbody td {
      padding: 13px 24px;
      color: var(--text-dark);
      font-weight: 400;
    }

    .td-num { color: var(--text-light); font-size: 0.8rem; width: 48px; }
    .td-date { color: var(--text-mid); font-size: 0.875rem; white-space: nowrap; }

    .empty-state {
      padding: 60px 24px;
      text-align: center;
      color: var(--text-light);
      font-size: 0.9rem;
    }

    .loading {
      padding: 60px 24px;
      text-align: center;
      color: var(--text-light);
      font-size: 0.9rem;
    }

    .access-denied {
      position: relative; z-index: 2;
      max-width: 400px; margin: 100px auto;
      text-align: center;
      color: var(--text-mid);
    }

    .access-denied h2 {
      font-family: 'Gilda Display', Georgia, serif;
      font-size: 1.6rem; color: var(--text-dark);
      margin-bottom: 12px;
    }

    #main-content { display: none; }
  </style>
</head>
<body>

  <div class="top-bar"></div>

  <header>
    <div class="logo">Parental <span>Care</span> Guide</div>
    <div style="display:flex;gap:16px;align-items:center;">
      <a href="/" style="font-size:0.875rem;color:var(--text-mid);text-decoration:none;">← Home</a>
      <a href="/login.html" style="font-size:0.875rem;color:var(--text-mid);text-decoration:none;">Sign In</a>
    </div>
  </header>

  <div id="access-denied" class="access-denied">
    <h2>Admin only</h2>
    <p>Checking your credentials…</p>
  </div>

  <div id="main-content" class="page">
    <h1 class="page-title">Waitlist</h1>
    <p class="page-sub">Newest entries first. Updates in real time.</p>

    <div class="stats-row">
      <div class="stat-card">
        <strong id="total-count">—</strong>
        <span>Total sign-ups</span>
      </div>
      <div class="stat-card">
        <strong id="today-count">—</strong>
        <span>Joined today</span>
      </div>
    </div>

    <div class="table-wrap">
      <div class="toolbar">
        <input class="search-input" type="text" placeholder="Filter by email…" id="search-input">
        <button class="export-btn" id="export-btn">Export CSV</button>
      </div>
      <div id="table-container" class="loading">Loading…</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/11.8.0/firebase-app.js';
    import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.8.0/firebase-auth.js';
    import { getFirestore, collection, onSnapshot, query, orderBy } from 'https://www.gstatic.com/firebasejs/11.8.0/firebase-firestore.js';

    const FIREBASE_CONFIG = {
      apiKey:            "AIzaSyB0GaJXI_lbLhEXmctMJ0LoHiV3cHL5vQY",
      authDomain:        "careguide-def76.firebaseapp.com",
      projectId:         "careguide-def76",
      storageBucket:     "careguide-def76.firebasestorage.app",
      messagingSenderId: "658340465706",
      appId:             "1:658340465706:web:0e412731947ff51474c753"
    };

    const app  = getApps().find(a => a.name === '[DEFAULT]') || initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    let allEntries = [];

    const denied  = document.getElementById('access-denied');
    const main    = document.getElementById('main-content');
    const totalEl = document.getElementById('total-count');
    const todayEl = document.getElementById('today-count');
    const tableEl = document.getElementById('table-container');
    const search  = document.getElementById('search-input');
    const exportBtn = document.getElementById('export-btn');

    function formatDate(ts) {
      if (!ts) return '—';
      const d = ts.toDate();
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
        + ' ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    }

    function isToday(ts) {
      if (!ts) return false;
      const d = ts.toDate();
      const now = new Date();
      return d.getFullYear() === now.getFullYear()
          && d.getMonth()    === now.getMonth()
          && d.getDate()     === now.getDate();
    }

    function renderTable(entries) {
      if (!entries.length) {
        tableEl.innerHTML = '<div class="empty-state">No entries yet.</div>';
        return;
      }
      const rows = entries.map((e, i) => `
        <tr>
          <td class="td-num">${entries.length - i}</td>
          <td>${e.email}</td>
          <td class="td-date">${formatDate(e.joinedAt)}</td>
        </tr>`).join('');

      tableEl.innerHTML = `
        <table>
          <thead><tr>
            <th>#</th>
            <th>Email</th>
            <th>Joined</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function applyFilter() {
      const q = search.value.trim().toLowerCase();
      const filtered = q ? allEntries.filter(e => e.email.toLowerCase().includes(q)) : allEntries;
      renderTable(filtered);
    }

    search.addEventListener('input', applyFilter);

    exportBtn.addEventListener('click', () => {
      const lines = ['Email,Joined'];
      allEntries.forEach(e => {
        const d = e.joinedAt ? e.joinedAt.toDate().toISOString() : '';
        lines.push(`${e.email},${d}`);
      });
      const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = 'waitlist.csv'; a.click();
      URL.revokeObjectURL(url);
    });

    onAuthStateChanged(auth, async user => {
      if (!user) { denied.querySelector('p').textContent = 'Sign in as admin to view this page.'; return; }

      const token = await user.getIdTokenResult(true);
      if (!token.claims.admin) { denied.querySelector('p').textContent = 'Admin access required.'; return; }

      denied.style.display = 'none';
      main.style.display   = 'block';

      const q = query(collection(db, 'waitlist'), orderBy('joinedAt', 'desc'));
      onSnapshot(q, snap => {
        allEntries = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        totalEl.textContent = allEntries.length;
        todayEl.textContent = allEntries.filter(e => isToday(e.joinedAt)).length;
        applyFilter();
      });
    });
  </script>
</body>
</html>
