<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parental Care Guide — Sign In</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="alternate icon" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Gilda+Display&family=Jost:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --rose:      #FFD6CC;
      --blush:     #F4B8C1;
      --mauve:     #E8A0B4;
      --lavender:  #D4A0C8;
      --periwinkle:#B8A8D8;
      --slate-blue:#98A8E0;
      --sky:       #8ABCE8;
      --deep-plum: #501464;
      --deep-plum-hover: #3a0f4e;
      --text-dark:  #1e1230;
      --text-mid:   #4a2d65;
      --text-light: #6b4d85;
      --glass-bg:   rgba(255, 255, 255, 0.38);
      --glass-border: rgba(255, 255, 255, 0.55);
    }

    body {
      font-family: 'Jost', 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(
        148deg,
        #FFF5F0 0%,
        #FFD6CC 12%,
        #F4B8C1 26%,
        #E8A0B4 40%,
        #D4A0C8 55%,
        #B8A8D8 70%,
        #98A8E0 84%,
        #8ABCE8 100%
      );
      z-index: 0;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 {
      width: 560px; height: 560px;
      background: radial-gradient(circle, rgba(255, 210, 220, 0.45) 0%, transparent 70%);
      top: -140px; left: -120px;
      animation: drift 10s ease-in-out infinite;
    }
    .blob-2 {
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(170, 148, 210, 0.3) 0%, transparent 70%);
      bottom: -200px; right: -160px;
      animation: drift 13s ease-in-out infinite reverse;
    }
    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%       { transform: translate(16px, -22px) scale(1.04); }
    }

    .top-bar {
      position: relative;
      z-index: 2;
      height: 4px;
      background: linear-gradient(90deg,
        #FFD6CC, #F4B8C1, #E8A0B4,
        #D4A0C8, #B8A8D8, #98A8E0, #8ABCE8
      );
    }

    .page {
      position: relative;
      z-index: 2;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 400px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .logo {
      font-family: 'Gilda Display', Georgia, serif;
      font-size: 1.1rem;
      color: var(--text-dark);
      letter-spacing: 0.02em;
      margin-bottom: 32px;
    }

    h1 {
      font-family: 'Gilda Display', Georgia, serif;
      font-size: 1.6rem;
      font-weight: 400;
      color: var(--text-dark);
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }

    .sub {
      font-size: 1rem;
      color: var(--text-mid);
      font-weight: 400;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-mid);
      margin-bottom: 6px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      color: var(--text-dark);
      font-family: 'Jost', sans-serif;
      font-size: 0.95rem;
      outline: none;
      margin-bottom: 20px;
      transition: border-color 0.2s, background 0.2s;
    }

    input::placeholder { color: #7a5a8a; }
    input:focus {
      border-color: var(--lavender);
      background: rgba(255, 255, 255, 0.65);
    }

    button {
      width: 100%;
      padding: 13px;
      background: var(--deep-plum);
      color: #ffffff;
      border: none;
      border-radius: 100px;
      font-family: 'Jost', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: background 0.2s;
    }

    button:hover { background: var(--deep-plum-hover); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .error {
      font-size: 1rem;
      color: #a0283c;
      margin-top: 14px;
      display: none;
    }
    .error.show { display: block; }

    .signup-link {
      margin-top: 20px;
      text-align: center;
      font-size: 0.875rem;
      color: var(--text-mid);
    }
    .signup-link a {
      color: var(--deep-plum);
      text-decoration: none;
      font-weight: 500;
    }
    .signup-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="top-bar"></div>

  <div class="page">
    <div class="card">
      <div class="logo">Parental Care Guide</div>
      <h1>Welcome back.</h1>
      <p class="sub">Sign in to continue.</p>
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      <button id="btn" onclick="signIn()">Sign In</button>
      <div class="error" id="error-msg"></div>
      <div class="signup-link">New here? <a href="/signup.html">Create a practitioner account</a></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.8.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/11.8.0/firebase-auth.js';

    const firebaseConfig = {
      apiKey:            "AIzaSyB0GaJXI_lbLhEXmctMJ0LoHiV3cHL5vQY",
      authDomain:        "careguide-def76.firebaseapp.com",
      projectId:         "careguide-def76",
      storageBucket:     "careguide-def76.firebasestorage.app",
      messagingSenderId: "658340465706",
      appId:             "1:658340465706:web:0e412731947ff51474c753"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Show error if redirected due to insufficient permissions
    const urlParams = new URLSearchParams(location.search);
    if (urlParams.get('error') === 'admin_required') {
      const errEl = document.getElementById('error-msg');
      errEl.textContent = 'That page requires an admin account. Please sign in as an admin.';
      errEl.classList.add('show');
    }

    window.signIn = async function () {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('btn');
      const errEl    = document.getElementById('error-msg');
      errEl.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        const cred  = await signInWithEmailAndPassword(auth, email, password);
        const token = await cred.user.getIdTokenResult(true);
        const next  = new URLSearchParams(location.search).get('next');

        if (token.claims.admin) {
          localStorage.setItem('pcg_admin', '1');
          location.href = next || '/index.html';
        } else if (token.claims.practitioner) {
          location.href = next || '/dashboard.html';
        } else if (token.claims.family) {
          location.href = next || '/family.html';
        } else {
          location.href = next || '/index.html';
        }
      } catch (e) {
        errEl.textContent = 'Incorrect email or password.';
        errEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    };

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') window.signIn();
    });
  </script>
  <script src="/version.js"></script>
</body>
</html>
