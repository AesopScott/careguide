<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareGuide — Admin</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
    }
    .logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: #2d6a4f;
      margin-bottom: 28px;
      letter-spacing: -0.02em;
    }
    h1 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }
    .sub {
      font-size: 13px;
      color: #8b949e;
      margin-bottom: 28px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #8b949e;
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }
    input {
      width: 100%;
      padding: 10px 14px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      font-size: 14px;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #2d6a4f; }
    button {
      width: 100%;
      padding: 11px;
      background: #2d6a4f;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #1f4d38; }
    button:disabled { background: #21262d; color: #6e7681; cursor: not-allowed; }
    .error {
      font-size: 12px;
      color: #f85149;
      margin-top: 12px;
      display: none;
    }
    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">CareGuide</div>
    <h1>Admin Login</h1>
    <p class="sub">Sign in to view internal pages.</p>
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="you@example.com" />
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••" />
    <button id="btn" onclick="signIn()">Sign In</button>
    <div class="error" id="error-msg"></div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.8.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/11.8.0/firebase-auth.js';

    const firebaseConfig = {
      apiKey:            "AIzaSyB0GaJXI_lbLhEXmctMJ0LoHiV3cHL5vQY",
      authDomain:        "careguide-def76.firebaseapp.com",
      projectId:         "careguide-def76",
      storageBucket:     "careguide-def76.firebasestorage.app",
      messagingSenderId: "658340465706",
      appId:             "1:658340465706:web:0e412731947ff51474c753"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.signIn = async function () {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('btn');
      const errEl    = document.getElementById('error-msg');
      errEl.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        const cred  = await signInWithEmailAndPassword(auth, email, password);
        const token = await cred.user.getIdTokenResult();
        if (token.claims.admin) {
          const dest = new URLSearchParams(location.search).get('next') || 'build.html';
          location.href = dest;
        } else {
          await auth.signOut();
          errEl.textContent = 'This account does not have admin access.';
          errEl.classList.add('show');
        }
      } catch (e) {
        errEl.textContent = 'Incorrect email or password.';
        errEl.classList.add('show');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    };

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') window.signIn();
    });
  </script>
</body>
</html>
