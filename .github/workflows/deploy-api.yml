name: Deploy API to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
  workflow_dispatch:

concurrency:
  group: deploy-cloudrun-careguide
  cancel-in-progress: false

env:
  PROJECT_ID: careguide-def76
  REGION: us-central1
  SERVICE: careguide-api
  IMAGE: us-central1-docker.pkg.dev/careguide-def76/careguide-api/api

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} ./api
          docker push ${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --no-allow-unauthenticated \
            --set-secrets="ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,FIREBASE_CREDENTIALS_PATH=FIREBASE_CREDENTIALS_PATH:latest" \
            --memory=512Mi \
            --min-instances=0 \
            --max-instances=10
