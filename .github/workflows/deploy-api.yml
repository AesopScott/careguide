name: Deploy API to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
  workflow_dispatch:

concurrency:
  group: deploy-cloudrun-careguide
  cancel-in-progress: false

env:
  PROJECT_ID: careguide-def76
  REGION: us-central1
  SERVICE: careguide-api
  IMAGE: us-central1-docker.pkg.dev/careguide-def76/careguide-api/api

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate Docker to Artifact Registry
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' | \
            docker login -u _json_key --password-stdin us-central1-docker.pkg.dev

      - name: Build and push image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} ./api
          docker push ${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --set-secrets="ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,BREVO_API_KEY=BREVO_API_KEY:latest,TWILIO_ACCOUNT_SID=TWILIO_ACCOUNT_SID:latest,TWILIO_AUTH_TOKEN=TWILIO_AUTH_TOKEN:latest,TWILIO_PHONE_NUMBER=TWILIO_PHONE_NUMBER:latest,/app/config/firebase-credentials.json=FIREBASE_CREDENTIALS_JSON:latest" \
            --set-env-vars="^|^FIREBASE_CREDENTIALS_PATH=/app/config/firebase-credentials.json|CORS_ORIGINS=https://parentalcareguide.com,https://www.parentalcareguide.com,https://careguide-def76.web.app,https://careguide-def76.firebaseapp.com" \
            --memory=512Mi \
            --min-instances=0 \
            --max-instances=10
