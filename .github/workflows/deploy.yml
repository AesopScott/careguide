name: Deploy to Mocahost (CareGuide)

on:
  push:
    branches:
      - main
      - stage
  workflow_dispatch:

concurrency:
  group: deploy-mocahost-careguide-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine server directory
        id: target
        run: |
          if [ "${GITHUB_REF_NAME}" = "stage" ]; then
            echo "dir=/public_html/parentalcareguide/stage.parentalcareguide.com/" >> "$GITHUB_OUTPUT"
            echo "env=stage" >> "$GITHUB_OUTPUT"
          else
            echo "dir=/public_html/parentalcareguide/" >> "$GITHUB_OUTPUT"
            echo "env=prod" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate version.js
        run: |
          SHA=$(git rev-parse --short HEAD)
          ENV="${{ steps.target.outputs.env }}"
          echo "(function(){var v='${SHA}';var env='${ENV}';var el=document.createElement('div');el.style.cssText='position:fixed;bottom:8px;left:12px;font-size:11px;opacity:0.35;font-family:monospace;z-index:9999;pointer-events:none;color:#000;';el.textContent=(env==='stage'?'[stage] ':'')+'v'+v;document.addEventListener('DOMContentLoaded',function(){document.body.appendChild(el);});})();" > version.js

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 65.181.111.131
          username: hivetec1
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./
          server-dir: ${{ steps.target.outputs.dir }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            **/.claude/**
            **/.DS_Store
            **/README.md
            cgi-bin/**
            api/**
            config/**
            firestore.rules
            firebase.json
            .firebaserc
            docs/**
            stage.parentalcareguide.com/**
