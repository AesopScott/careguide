name: Deploy to Mocahost (CareGuide)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-mocahost-careguide
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate version.js
        run: |
          SHA=$(git rev-parse --short HEAD)
          echo "(function(){var v='${SHA}';var el=document.createElement('div');el.style.cssText='position:fixed;bottom:8px;left:12px;font-size:11px;opacity:0.35;font-family:monospace;z-index:9999;pointer-events:none;color:#000;';el.textContent='v'+v;document.addEventListener('DOMContentLoaded',function(){document.body.appendChild(el);});})();" > version.js

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 65.181.111.131
          username: hivetec1
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./
          server-dir: /public_html/parentalcareguide/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            **/.claude/**
            **/.DS_Store
            **/README.md
            cgi-bin/**
            api/**
            config/**
            firestore.rules
            firebase.json
            .firebaserc
