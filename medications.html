<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parental Care Guide — Medications</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Gilda+Display&family=Jost:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --plum:        #501464;
      --plum-light:  #6b1e85;
      --plum-pale:   #f5eeff;
      --plum-muted:  rgba(80,20,100,0.08);
      --text-dark:   #1e1230;
      --text-mid:    #4a3060;
      --text-muted:  #8b7a9e;
      --bg:          #faf9fc;
      --surface:     #ffffff;
      --border:      #ece6f4;
      --border-mid:  #d8cce8;
      --level-low:   #2ea043;
      --level-crisis:#dc2626;
      --nav-h: 60px;
    }

    body {
      font-family: 'Jost', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-dark);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      visibility: hidden;
    }

    .top-nav {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: var(--plum);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; z-index: 100;
    }
    .nav-brand { font-family: 'Gilda Display', Georgia, serif; font-size: 1rem; color: rgba(255,255,255,0.9); text-decoration: none; }
    .nav-center { font-size: 0.8rem; font-weight: 500; color: rgba(255,255,255,0.5); letter-spacing: 0.08em; text-transform: uppercase; }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .nav-signout {
      font-size: 0.78rem; color: rgba(255,255,255,0.5); background: none;
      border: 1px solid rgba(255,255,255,0.18); border-radius: 6px; padding: 5px 12px;
      cursor: pointer; font-family: 'Jost', sans-serif; transition: all 0.15s;
    }
    .nav-signout:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); }
    .nav-back {
      font-size: 0.8rem; color: rgba(255,255,255,0.6); background: none;
      border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; padding: 5px 12px;
      cursor: pointer; font-family: 'Jost', sans-serif; text-decoration: none; transition: all 0.15s;
    }
    .nav-back:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.85); }

    .page {
      padding-top: calc(var(--nav-h) + 32px);
      padding-bottom: 80px;
      max-width: 800px; margin: 0 auto;
      padding-left: 24px; padding-right: 24px;
    }

    .page-header {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin-bottom: 24px; gap: 16px; flex-wrap: wrap;
    }
    .page-header h1 {
      font-family: 'Gilda Display', Georgia, serif;
      font-size: 1.6rem; font-weight: 400;
      color: var(--text-dark); letter-spacing: -0.02em;
    }
    .page-header .sub { font-size: 0.8rem; color: var(--text-muted); margin-top: 3px; }

    .btn-primary {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--plum); color: #fff; border: none;
      border-radius: 8px; padding: 10px 20px;
      font-size: 0.875rem; font-weight: 600;
      font-family: 'Jost', sans-serif; cursor: pointer; text-decoration: none;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: var(--plum-light); }

    /* ── Med list ── */
    .section-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden; margin-bottom: 20px;
    }
    .section-header {
      padding: 16px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .section-label {
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted);
    }

    .med-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      gap: 16px;
      transition: background 0.1s;
    }
    .med-row:last-child { border-bottom: none; }
    .med-row:hover { background: var(--bg); }

    .med-name { font-weight: 600; font-size: 0.925rem; color: var(--text-dark); }
    .med-detail {
      font-size: 0.8rem; color: var(--text-muted); margin-top: 3px;
      display: flex; gap: 10px; flex-wrap: wrap;
    }
    .med-detail span { display: flex; align-items: center; gap: 4px; }

    .med-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

    .pill {
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.05em;
      text-transform: uppercase; padding: 3px 10px; border-radius: 20px;
    }
    .pill-active   { color: var(--level-low); background: #f0faf3; }
    .pill-inactive { color: var(--text-muted); background: var(--bg); }

    .btn-icon {
      background: none; border: 1px solid var(--border-mid);
      border-radius: 6px; padding: 5px 10px; cursor: pointer;
      font-size: 0.78rem; color: var(--text-mid);
      font-family: 'Jost', sans-serif; transition: all 0.15s;
    }
    .btn-icon:hover { background: var(--plum-muted); border-color: var(--plum); color: var(--plum); }
    .btn-icon.danger:hover { background: #fff5f5; border-color: #fca5a5; color: var(--level-crisis); }

    .empty-state {
      text-align: center; padding: 56px 24px; color: var(--text-muted);
    }
    .empty-state p { margin-bottom: 16px; font-size: 0.9rem; }

    .skeleton {
      background: linear-gradient(90deg, #ede8f5 25%, #f5f0ff 50%, #ede8f5 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px; height: 14px; width: 100%;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(30,18,48,0.5); z-index: 300;
      align-items: center; justify-content: center; padding: 24px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 16px; padding: 28px;
      width: 100%; max-width: 520px;
      max-height: 90vh; overflow-y: auto;
    }
    .modal h2 {
      font-family: 'Gilda Display', serif;
      font-size: 1.2rem; font-weight: 400; margin-bottom: 22px; color: var(--text-dark);
    }
    .field { margin-bottom: 18px; }
    .field label {
      display: block; font-size: 0.78rem; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 6px;
    }
    .field label .opt { font-weight: 400; color: var(--text-muted); font-size: 0.72rem; margin-left: 4px; }
    input[type="text"], input[type="date"], select, textarea {
      width: 100%; padding: 9px 12px;
      border: 1px solid var(--border-mid); border-radius: 8px;
      font-family: 'Jost', sans-serif; font-size: 0.875rem; color: var(--text-dark); background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s; appearance: none;
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: var(--plum); box-shadow: 0 0 0 3px var(--plum-muted);
    }
    input::placeholder, textarea::placeholder { color: var(--text-muted); }
    textarea { resize: vertical; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }
    .btn-cancel-modal {
      padding: 9px 18px; border: 1px solid var(--border-mid); border-radius: 8px;
      background: none; font-family: 'Jost', sans-serif; font-size: 0.875rem;
      cursor: pointer; color: var(--text-mid); transition: background 0.15s;
    }
    .btn-cancel-modal:hover { background: var(--bg); }
    .btn-save-modal {
      padding: 9px 20px; background: var(--plum); color: #fff; border: none;
      border-radius: 8px; font-family: 'Jost', sans-serif;
      font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: background 0.15s;
    }
    .btn-save-modal:hover { background: var(--plum-light); }

    .save-toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--plum); color: #fff; padding: 10px 20px;
      border-radius: 10px; font-size: 0.875rem; font-weight: 500;
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 400;
    }
    .save-toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<nav class="top-nav">
  <a href="/dashboard.html" class="nav-brand">Parental Care Guide</a>
  <span class="nav-center">Medications</span>
  <div class="nav-right">
    <a id="backToClient" href="/dashboard.html" class="nav-back">← Client</a>
    <button class="nav-signout" id="signOutBtn">Sign out</button>
  </div>
</nav>

<main class="page">
  <div class="page-header">
    <div>
      <h1 id="pageTitle">Medications</h1>
      <div class="sub" id="pageSubtitle">Loading…</div>
    </div>
    <button class="btn-primary" onclick="openModal()">+ Add Medication</button>
  </div>

  <div class="section-card">
    <div class="section-header">
      <span class="section-label">Active</span>
    </div>
    <div id="activeMeds">
      <div class="med-row"><div><div class="skeleton" style="width:180px;margin-bottom:8px;"></div><div class="skeleton" style="width:240px;"></div></div></div>
      <div class="med-row"><div><div class="skeleton" style="width:150px;margin-bottom:8px;"></div><div class="skeleton" style="width:200px;"></div></div></div>
    </div>
  </div>

  <div class="section-card" id="inactiveCard" style="display:none;">
    <div class="section-header">
      <span class="section-label">Inactive / Discontinued</span>
    </div>
    <div id="inactiveMeds"></div>
  </div>
</main>

<!-- ── Add / Edit modal ── -->
<div class="modal-overlay" id="medModal">
  <div class="modal">
    <h2 id="modalTitle">Add Medication</h2>

    <div class="field">
      <label>Medication name</label>
      <input type="text" id="medName" placeholder="e.g. Lisinopril" />
    </div>
    <div class="field field-row">
      <div>
        <label>Dosage</label>
        <input type="text" id="medDosage" placeholder="e.g. 10mg" />
      </div>
      <div>
        <label>Frequency</label>
        <input type="text" id="medFrequency" placeholder="e.g. Once daily" />
      </div>
    </div>
    <div class="field field-row">
      <div>
        <label>Prescriber <span class="opt">(optional)</span></label>
        <input type="text" id="medPrescriber" placeholder="Dr. Smith" />
      </div>
      <div>
        <label>Start date <span class="opt">(optional)</span></label>
        <input type="date" id="medStartDate" />
      </div>
    </div>
    <div class="field">
      <label>Status</label>
      <select id="medStatus">
        <option value="active">Active</option>
        <option value="inactive">Inactive / Discontinued</option>
      </select>
    </div>
    <div class="field">
      <label>Notes <span class="opt">(optional)</span></label>
      <textarea id="medNotes" rows="2" placeholder="Side effects, special instructions…"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel-modal" onclick="closeModal()">Cancel</button>
      <button class="btn-save-modal" onclick="saveMed()">Save Medication</button>
    </div>
  </div>
</div>

<div class="save-toast" id="saveToast">Saved</div>

<script type="module">
import { initializeApp }           from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut }
                                   from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, doc, getDoc, getDocs, addDoc, updateDoc, deleteDoc,
         query, where, orderBy, serverTimestamp }
                                   from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey:            "AIzaSyB0GaJXI_lbLhEXmctMJ0LoHiV3cHL5vQY",
  authDomain:        "careguide-def76.firebaseapp.com",
  projectId:         "careguide-def76",
  storageBucket:     "careguide-def76.firebasestorage.app",
  messagingSenderId: "658340465706",
  appId:             "1:658340465706:web:0e412731947ff51474c753"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

const params   = new URLSearchParams(location.search);
const familyId = params.get('id');
if (!familyId) window.location.href = '/dashboard.html';

let currentUser = null;
let medsData    = [];
let editingId   = null;

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = `/login.html?next=/medications.html?id=${familyId}`; return; }
  const token = await user.getIdTokenResult();
  if (!token.claims.practitioner && !token.claims.admin && !token.claims.family) {
    window.location.href = '/login.html'; return;
  }
  currentUser = user;
  document.body.style.visibility = 'visible';
  document.getElementById('backToClient').href = `/client.html?id=${familyId}`;
  await loadData();
});

document.getElementById('signOutBtn').addEventListener('click', async () => {
  await signOut(auth);
  window.location.href = '/login.html';
});

async function loadData() {
  const [familySnap, medsSnap] = await Promise.all([
    getDoc(doc(db, 'family_groups', familyId)),
    getDocs(query(collection(db, 'medications'), where('family_group_id', '==', familyId), orderBy('created_at', 'desc'))),
  ]);

  if (familySnap.exists()) {
    const fam = familySnap.data();
    document.getElementById('pageTitle').textContent    = `${fam.name || 'Client'} — Medications`;
    document.getElementById('pageSubtitle').textContent = `Medication list for ${fam.name || 'this family'}`;
  }

  medsData = medsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderMeds();
}

function renderMeds() {
  const active   = medsData.filter(m => m.status !== 'inactive');
  const inactive = medsData.filter(m => m.status === 'inactive');

  renderList(document.getElementById('activeMeds'), active, true);

  if (inactive.length) {
    document.getElementById('inactiveCard').style.display = '';
    renderList(document.getElementById('inactiveMeds'), inactive, false);
  } else {
    document.getElementById('inactiveCard').style.display = 'none';
  }
}

function renderList(el, meds, isActive) {
  if (!meds.length) {
    el.innerHTML = `<div class="empty-state"><p>${isActive ? 'No active medications.' : 'No inactive medications.'}</p></div>`;
    return;
  }
  el.innerHTML = meds.map(m => `
    <div class="med-row">
      <div>
        <div class="med-name">${m.name || '—'}</div>
        <div class="med-detail">
          ${m.dosage     ? `<span>💊 ${m.dosage}</span>`     : ''}
          ${m.frequency  ? `<span>🔁 ${m.frequency}</span>`  : ''}
          ${m.prescriber ? `<span>👤 ${m.prescriber}</span>` : ''}
          ${m.start_date ? `<span>📅 Since ${formatDate(m.start_date)}</span>` : ''}
        </div>
        ${m.notes ? `<div style="font-size:0.78rem;color:var(--text-muted);margin-top:4px;">${m.notes}</div>` : ''}
      </div>
      <div class="med-actions">
        <span class="pill ${m.status === 'inactive' ? 'pill-inactive' : 'pill-active'}">${m.status === 'inactive' ? 'Inactive' : 'Active'}</span>
        <button class="btn-icon" onclick="editMed('${m.id}')">Edit</button>
        <button class="btn-icon" onclick="toggleStatus('${m.id}')">${m.status === 'inactive' ? 'Reactivate' : 'Discontinue'}</button>
        <button class="btn-icon danger" onclick="deleteMed('${m.id}')">Delete</button>
      </div>
    </div>
  `).join('');
}

// ── Modal ────────────────────────────────────────────────────────────────────
window.openModal = function (id) {
  editingId = id || null;
  const med = id ? medsData.find(m => m.id === id) : null;

  document.getElementById('modalTitle').textContent = med ? 'Edit Medication' : 'Add Medication';
  document.getElementById('medName').value       = med?.name        || '';
  document.getElementById('medDosage').value     = med?.dosage      || '';
  document.getElementById('medFrequency').value  = med?.frequency   || '';
  document.getElementById('medPrescriber').value = med?.prescriber  || '';
  document.getElementById('medStartDate').value  = med?.start_date  || '';
  document.getElementById('medStatus').value     = med?.status      || 'active';
  document.getElementById('medNotes').value      = med?.notes       || '';

  document.getElementById('medModal').classList.add('open');
  document.getElementById('medName').focus();
};
window.closeModal = () => document.getElementById('medModal').classList.remove('open');
window.editMed   = (id) => openModal(id);

window.saveMed = async function () {
  const name = document.getElementById('medName').value.trim();
  if (!name) { document.getElementById('medName').focus(); return; }

  const data = {
    family_group_id: familyId,
    practitioner_id: currentUser.uid,
    name,
    dosage:      document.getElementById('medDosage').value.trim()     || null,
    frequency:   document.getElementById('medFrequency').value.trim()  || null,
    prescriber:  document.getElementById('medPrescriber').value.trim() || null,
    start_date:  document.getElementById('medStartDate').value         || null,
    status:      document.getElementById('medStatus').value,
    notes:       document.getElementById('medNotes').value.trim()      || null,
    updated_at:  serverTimestamp(),
  };

  if (editingId) {
    await updateDoc(doc(db, 'medications', editingId), data);
    const idx = medsData.findIndex(m => m.id === editingId);
    if (idx >= 0) medsData[idx] = { ...medsData[idx], ...data };
  } else {
    data.created_at = serverTimestamp();
    const ref = await addDoc(collection(db, 'medications'), data);
    medsData.unshift({ id: ref.id, ...data });
  }

  closeModal();
  renderMeds();
  showToast(editingId ? 'Updated' : 'Medication added');
};

window.toggleStatus = async function (id) {
  const med    = medsData.find(m => m.id === id);
  if (!med) return;
  const newStatus = med.status === 'inactive' ? 'active' : 'inactive';
  await updateDoc(doc(db, 'medications', id), { status: newStatus, updated_at: serverTimestamp() });
  med.status = newStatus;
  renderMeds();
  showToast(newStatus === 'active' ? 'Reactivated' : 'Discontinued');
};

window.deleteMed = async function (id) {
  if (!confirm('Delete this medication? This cannot be undone.')) return;
  await deleteDoc(doc(db, 'medications', id));
  medsData = medsData.filter(m => m.id !== id);
  renderMeds();
  showToast('Deleted');
};

function formatDate(d) {
  if (!d) return '';
  const [y, m, dd] = d.split('-');
  return `${m}/${dd}/${y}`;
}

function showToast(msg) {
  const t = document.getElementById('saveToast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

document.getElementById('medModal').addEventListener('click', e => {
  if (e.target === document.getElementById('medModal')) closeModal();
});
</script>
</body>
</html>
